name: replay-problem-catalog

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: problem-catalog-replay
  cancel-in-progress: false

jobs:
  replay-problem-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: install python dependencies
        run: pip install -r requirements.txt

      - name: replay generated problem catalog from LeetCode
        run: |
          python -m automation replay \
            --source-url-base "${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}" \
            --session-token "${{ secrets.LEETCODE_SESSION }}"

      - name: commit generated files
        run: |
          set -euo pipefail

          if git diff --quiet -- data/problems.yml; then
            echo "Problem catalog is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/problems.yml
          git commit -m "ci(catalog): replay generated problem catalog"
          git push
