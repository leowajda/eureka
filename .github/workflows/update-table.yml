name: update problem table
run-name: update problem table

on:
  push:
    branches: [master]
    paths:
      - 'java/**'
      - 'scala/**'
      - 'python/**'
      - 'cpp/**'
  workflow_dispatch:

jobs:
  update-table:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install pip dependencies
        run: pip install -r requirements.txt

      - name: update table slices
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          SOURCE_URL_BASE: ${{ github.server_url }}/${{ github.repository }}/blob/master
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          base="$EVENT_BEFORE"
          head="$EVENT_SHA"

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head}^" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}^")"
            else
              base="$(git hash-object -t tree /dev/null)"
            fi
          fi

          while IFS='|' read -r language label code_language path_prefix path_glob; do
            added_files="$(git diff --no-renames --diff-filter=A --name-only "$base" "$head" -- "$path_prefix")"
            changed_files="$(git diff --no-renames --diff-filter=M --name-only "$base" "$head" -- "$path_prefix")"
            removed_files="$(git diff --no-renames --diff-filter=D --name-only "$base" "$head" -- "$path_prefix")"

            if [ -z "$added_files$changed_files$removed_files" ]; then
              continue
            fi

            TARGET_LANGUAGE="$language" \
            TARGET_LABEL="$label" \
            TARGET_CODE_LANGUAGE="$code_language" \
            TARGET_PATH_PREFIX="$path_prefix" \
            TARGET_PATH_GLOB="$path_glob" \
            SOURCE_URL_BASE="$SOURCE_URL_BASE" \
            SYNC_MODE="incremental" \
            YAML_FILE="_data/problems.yml" \
            ADDED_FILES="$added_files" \
            CHANGED_FILES="$changed_files" \
            REMOVED_FILES="$removed_files" \
            python .github/workflows/scripts/update_table.py
          done <<'EOF'
          java|Java|java|java|java/src/main/**/*.java
          scala|Scala|scala|scala|scala/src/main/**/*.scala
          python|Python|python|python|python/src/**/*.py
          cpp|C++|cpp|cpp|cpp/src/**/*.cpp
          EOF

      - name: auto-commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "ci(docs): update problem table"
