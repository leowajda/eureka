name: validate-repository

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
  merge_group:

permissions:
  contents: read

jobs:
  validate-commit-messages:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: resolve commit range
        id: range
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              echo "branch=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
              ;;
            push)
              echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              ;;
            merge_group)
              echo "base=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.event.merge_group.head_sha }}" >> "$GITHUB_OUTPUT"
              echo "branch=" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported event '${{ github.event_name }}'." >&2
              exit 1
              ;;
          esac

      - name: validate commit messages
        run: |
          python -m automation validate-commits \
            --base "${{ steps.range.outputs.base }}" \
            --head "${{ steps.range.outputs.head }}" \
            --branch-name "${{ steps.range.outputs.branch }}"

  validate-python:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: install python dependencies
        run: pip install -r requirements.txt

      - name: lint automation
        run: python -m ruff check automation tests

      - name: run python tests
        run: python -m pytest

      - name: compile python source trees
        run: python -m compileall automation python/src

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: configure cpp build
        run: cmake -S cpp -B cpp/build

      - name: build cpp targets
        run: cmake --build cpp/build

  build-java:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: compile java sources
        working-directory: java
        run: ./gradlew --no-daemon compileJava

  build-scala:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: setup sbt
        uses: sbt/setup-sbt@v1

      - name: compile scala sources
        working-directory: scala
        run: sbt --batch compile
