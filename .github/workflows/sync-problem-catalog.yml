name: sync-problem-catalog

on:
  push:
    branches: [master]
    paths:
      - "java/**"
      - "scala/**"
      - "python/**"
      - "cpp/**"
      - ".github/problem-catalog/targets.yml"
      - "automation/**"
      - "requirements.txt"
      - "pyproject.toml"

permissions:
  contents: write

concurrency:
  group: problem-catalog-sync
  cancel-in-progress: false

jobs:
  sync-problem-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: install python dependencies
        run: pip install -r requirements.txt

      - name: sync generated problem catalog from LeetCode
        run: |
          python -m automation sync \
            --targets-path .github/problem-catalog/targets.yml \
            --catalog-path _data/problems.yml \
            --source-url-base "${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}" \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}" \
            --session-token "${{ secrets.LEETCODE_SESSION }}"

      - name: commit generated files
        run: |
          set -euo pipefail

          if git diff --quiet -- _data/problems.yml; then
            echo "Problem catalog is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/problems.yml
          git commit -m "ci(catalog): sync generated problem catalog"
          git push
