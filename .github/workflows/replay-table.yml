on:
  workflow_call:
    inputs:
      path-filter:
        description: 'path containing the source code.'
        required: true
        type: string
      eureka-ref:
        description: 'eureka branch to checkout'
        default: 'feature/yaml-migration'
        required: false
        type: string
    secrets:
      LEETCODE_SESSION:
        description: 'LeetCode session cookie for metadata fetching'
        required: false

jobs:
  replay-table:
    runs-on: ubuntu-latest
    steps:
      - name: checkout eureka
        uses: actions/checkout@v6
        with:
          repository: leowajda/eureka
          submodules: false
          ref: ${{ inputs.eureka-ref }}

      - name: checkout caller (full history)
        uses: actions/checkout@v6
        with:
          path: source-code
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: install pip dependencies
        run: pip install -r requirements.txt

      - name: get all files with solution history
        id: files
        run: |
          cd source-code
          added=$(git log --all --pretty=format: --name-only --diff-filter=ACM \
            -- "${{ inputs.path-filter }}" | sort -u | tr '\n' ' ')
          echo "added_files=$added" >> "$GITHUB_OUTPUT"

      - name: run script
        id: run_script
        env:
          repository: ${{ github.repository }}
          server_url: ${{ github.server_url }}
          added_files: ${{ steps.files.outputs.added_files }}
          changed_files: ""
          removed_files: ""
          readme: README.md
          yaml_file: _data/problems.yml
          header: _data/text.md
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
        run: cd source-code && python ../.github/workflows/scripts/update_table.py

      - name: auto-commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        id: auto_commit
        with:
          commit_message: "ci(docs): manually replay table from git history"
          repository: source-code
