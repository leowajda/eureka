name: replay problem table
run-name: replay problem table

on:
  workflow_dispatch:

jobs:
  replay-table:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: install pip dependencies
        run: pip install -r requirements.txt

      - name: replay table slices
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          SOURCE_URL_BASE: ${{ github.server_url }}/${{ github.repository }}/blob/master
        run: |
          set -euo pipefail

          while IFS='|' read -r language label code_language path_prefix path_glob; do
            current_files="$(git ls-files "$path_prefix")"

            TARGET_LANGUAGE="$language" \
            TARGET_LABEL="$label" \
            TARGET_CODE_LANGUAGE="$code_language" \
            TARGET_PATH_PREFIX="$path_prefix" \
            TARGET_PATH_GLOB="$path_glob" \
            SOURCE_URL_BASE="$SOURCE_URL_BASE" \
            SYNC_MODE="replay" \
            YAML_FILE="_data/problems.yml" \
            CURRENT_FILES="$current_files" \
            python .github/workflows/scripts/update_table.py
          done <<'EOF'
          java|Java|java|java|java/src/main/**/*.java
          scala|Scala|scala|scala|scala/src/main/**/*.scala
          python|Python|python|python|python/src/**/*.py
          cpp|C++|cpp|cpp|cpp/src/**/*.cpp
          EOF

      - name: auto-commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "ci(docs): replay problem table from monorepo history"
