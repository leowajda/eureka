name: conventional commits

on:
  pull_request:
  push:
    branches: [master]

jobs:
  cog_check_job:
    runs-on: ubuntu-latest
    name: check conventional commit compliance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: conventional commit check
        id: commit_check
        uses: cocogitto/cocogitto-action@v4
